<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>BitMaturaXDiament</title>
    <script type="text/javascript">
      var pathSegmentsToKeep = 0;

      var l = window.location;
      var path = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')
        .replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash;
      
      // Store the redirect path in sessionStorage
      sessionStorage.setItem('redirect', '/?/' + path);
      
      // Redirect to home page with query parameter
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' + path
      );
    </script>
  </head>
  <body>
  </body>
</html>
